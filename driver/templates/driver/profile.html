
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Enhanced User Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      background-color: #f5f6fa;
      min-height: 100vh;
    }

    .sidebar {
      width: 250px;
      background-color: #ffffff;
      padding: 30px 20px;
      border-right: 1px solid #ddd;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .sidebar h2 {
      font-size: 20px;
      margin-bottom: 30px;
    }

    .nav-links {
      list-style: none;
    }

    .nav-links li {
      margin-bottom: 22px;
      font-size: 16px;
      color: #555;
      padding: 8px 10px;
      border-radius: 8px;
      transition: all 0.2s ease-in-out;
      cursor: pointer;
    }

    .nav-links li:hover,
    .nav-links li.active {
      background-color: #f3f4f6;
      font-weight: 600;
      color: #000;
    }

    .logout {
      font-size: 14px;
      color: #888;
      cursor: pointer;
      transition: color 0.2s;
    }

    .logout:hover {
      color: #000;
    }

    .main {
      flex: 1;
      padding: 50px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .profile-pic {
      position: relative;
      display: inline-block;
    }
    .profile-pic img {
      width: 120px;
      height: 120px;
      object-fit: cover;
      border-radius: 50%;
      border: 4px solid #ff6b35;
    }
    .profile-pic input[type="file"] {
      display: none;
    }
    .edit-icon {
      position: absolute;
      bottom: 0;
      right: 0;
      background-color: #ff6b35;
      color: white;
      border-radius: 50%;
      padding: 5px;
      cursor: pointer;
      font-size: 14px;
    }

    .profile-pic h2 {
      margin-top: 15px;
      font-size: 22px;
    }

    .profile-pic p {
      color: gray;
      font-size: 14px;
    }

    .form {
      margin-top: 40px;
      width: 100%;
      max-width: 700px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 25px;
    }

    .form label {
      font-size: 14px;
      color: #333;
      margin-bottom: 5px;
      display: block;
    }

    .form input {
      width: 100%;
      padding: 12px 15px;
      border: 1px solid #ddd;
      border-radius: 10px;
      background-color: #fff;
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.03);
    }

    .form-full {
      grid-column: span 2;
    }

    .save-btn {
      margin-top: 30px;
      padding: 14px 35px;
      background: linear-gradient(45deg, #ff7a18, #ff9a44);
      color: white;
      border: none;
      border-radius: 30px;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(255,122,24,0.3);
      transition: background 0.3s ease;
    }

    .save-btn:hover {
      background: linear-gradient(45deg, #ff9a44, #ff7a18);
    }

    @media (max-width: 768px) {
      .form {
        grid-template-columns: 1fr;
      }

      .form-full {
        grid-column: span 1;
      }
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <div>
      <h2>User Profile</h2>
      <ul class="nav-links">
        <li class="active">👤 User info</li>
        <li>🤍 Favorites</li>
        <li>⭐ Watchlist</li>
        <li>⚙️ Setting</li>
        <li>🔔 Notifications</li>
      </ul>
    </div>
    <div class="logout">🔓 Log out</div>
  </div>

  <div class="main">
    <div class="profile-pic">
        <img id="profileImage" src="https://i.pravatar.cc/120?img=3" alt="Profile" />
        <label for="fileUpload" class="edit-icon">✎</label>
        <input type="file" id="fileUpload" accept="image/*" />
      <h2>Sara Tancredi</h2>
      <p>New York, USA</p>
    </div>

    <form class="form">
      <div>
        <label>First Name</label>
        <input type="text" value="Sara">
      </div>
      <div>
        <label>Last Name</label>
        <input type="text" value="Tancredi">
      </div>
      <div class="form-full">
        <label>Email Address</label>
        <input type="email" value="Sara.Tancredi@gmail.com">
      </div>
      <div>
        <label>Phone Number</label>
        <input type="text" value="(+98) 9123728167">
      </div>
      <div>
        <label>Postal Code</label>
        <input type="text" value="23728167">
      </div>
      <div class="form-full">
        <label>Location</label>
        <input type="text" value="New York, USA">
      </div>
    </form>

    <button class="save-btn">Save Changes</button>
  </div>
</body>
<script>
    const fileUpload = document.getElementById("fileUpload");
    const profileImage = document.getElementById("profileImage");

    fileUpload.addEventListener("change", function () {
      const file = this.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function (e) {
          profileImage.src = e.target.result;
        };
        reader.readAsDataURL(file);
      }
    });
  </script>
</html>

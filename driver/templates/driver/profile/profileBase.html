
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Enhanced User Profile</title>
  {% load static %}
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      background-color: #f5f6fa;
      min-height: 100vh;
    }

    .sidebar {
      width: 250px;
      background-color: #ffffff;
      padding: 30px 20px;
      border-right: 1px solid #ddd;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      text-align: center;
    }

    .sidebar h2 {
      font-size: 20px;
      margin-bottom: 30px;
    }

    .nav-links {
      list-style: none;
    }

    .nav-links li {
      margin-bottom: 22px;
      font-size: 16px;
      color: #555;
      padding: 8px 10px;
      border-radius: 8px;
      transition: all 0.2s ease-in-out;
      cursor: pointer;
    }

    .nav-links li:hover,
    .nav-links li.active {
      background-color: #f3f4f6;
      font-weight: 600;
      color: #000;
    }

    .logout {
      font-size: 14px;
      color: #888;
      cursor: pointer;
      transition: color 0.2s;
    }

    .logout:hover {
      color: #000;
    }

    .main {
      flex: 1;
      padding: 50px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .profile-pic {
      position: relative;
      display: inline-block;
    }
    .profile-pic img {
      width: 120px;
      height: 120px;
      object-fit: cover;
      border-radius: 50%;
      border: 4px solid #ff6b35;
    }
    .profile-pic input[type="file"] {
      display: none;
    }
    .edit-icon {
      position: relative;
      top: -20px;
      left: -30px;
      width: 20px;
      height: 20px;
      background-color: #ff6b35;
      color: white;
      border-radius: 100%;
      padding: 5px;
      cursor: pointer;
      font-size: 14px;
    }

    .profile-pic h2,.profile-pic p{
        position: relative;
        width: 80%;
    }

    .profile-pic h2 {
      margin-top: 15px;
      font-size: 22px;
      text-align: center;
    }

    .profile-pic p {
      color: gray;
      font-size: 14px;
      text-align: center;
    }

    .form {
      margin-top: 40px;
      width: 100%;
      max-width: 700px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 25px;
    }

    .form label {
      font-size: 14px;
      color: #333;
      margin-bottom: 5px;
      display: block;
    }

    .form input,.form select {
      width: 100%;
      padding: 12px 15px;
      border: 1px solid #ddd;
      border-radius: 10px;
      background-color: #fff;
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.03);
    }

    .form-full {
      grid-column: span 1;
    }

    .save-btn {
      margin-top: 30px;
      padding: 14px 35px;
      background: linear-gradient(45deg, #ff7a18, #ff9a44);
      color: white;
      border: none;
      border-radius: 30px;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(255,122,24,0.3);
      transition: background 0.3s ease;
    }
    .button{
      position: relative;
      flex: 1;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      grid-column: span 2;
    }

    .save-btn:hover {
      background: linear-gradient(45deg, #ff9a44, #ff7a18);
    }

    @media (max-width: 768px) {
      .form {
        grid-template-columns: 1fr;
      }

      .form-full {
        grid-column: span 1;
      }
    }
    .base{
        display: grid;
        grid-template-columns: repeat(2,1fr);
        gap: 5px;
    }
    .btn{
        text-decoration: none;
        color: white;
        background: linear-gradient(45deg, #ff7a18, #ff9a44);
        padding: 2px;
        border-radius: 5vmin;

    }
  </style>
  <link rel="stylesheet" href="{% static 'style/admin.css' %}" />
  <link
  href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css"
  rel="stylesheet"
/>
</head>
<body>
  <div class="sidebar">
    <div>
      <h2>User Profile</h2>
      <div class="nav-cont">
          <a href="{% url 'driverProfile' %}" class="nav-item {% if pg != 1 %}non{% endif %}active">
            <span><i class="ri-user-3-fill"></i></span>
            Profile
          </a>
          <a href="{% url 'historytrip' %}" class="nav-item {% if pg != 2 %}non{% endif %}active">
            <span><i class="ri-hourglass-fill"></i></span>
            History
          </a>
          <a href="{% url 'driverVehicles' %}" class="nav-item {% if pg != 3 %}non{% endif %}active">
            <span><i class="ri-taxi-fill"></i></span>
            Vehicles
          </a>
          <a href="{% url 'addVehicle' %}" class="nav-item {% if pg != 4 %}non{% endif %}active">
            <span><i class="ri-file-add-fill"></i></span>
            Add Vehicles
          </a>
          <a href="{% url 'reviewsOfDriver' %}" class="nav-item {% if pg != 5 %}non{% endif %}active">
            <span><i class="ri-feedback-fill"></i></span>
            Reviews
          </a>
          
        </div>
    </div>
    <div class="base">
    <a class="btn" href="{% url 'driverDashboard' %}">back</a>
    <a class="btn" href="{% url 'logoutDriver' %}" class="logout">Log out</a>
</div>
  </div>  
    {% block content %}
    {% endblock %}
  {% if messages %}
  <style>
.alertBox {
  background-color: #fff;
  width: 6px; 
  height: 30px;
  border-radius: 5px;
  display: flex;
  justify-content: space-between;
  box-shadow: 10px 1px 25px rgba(0, 0, 0, 0.3);
  position: absolute;
  top: 16%;
  right: 20px;
  overflow: hidden;
  z-index: 3;
  animation: expandBar 0.5s ease-out forwards;
}
.data {
  width: 95%; 
  position: relative;
  top: 4px;
  text-align: center;
  opacity: 0;
  animation: revealText 0.5s ease-out forwards 0.5s;
}
.bar {
  width: 6px;
  height: 28px;
  background-color: #ff833e;
  position: relative;
  top: 1px;
  border-radius: 5px;
}
/* Expand on show */
@keyframes expandBar {
  from { width: 6px; }
  to { width: 250px; }
}

/* Reveal Text */
@keyframes revealText {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* Hide Animation */
@keyframes hideAlert {
  from { opacity: 1;}
  to { opacity: 0;}
}

/* Shrink Bar */
@keyframes shrinkBar {
  from { width: 250px; }
  to { width: 6px; }
}

.hideText {
  animation: hideAlert 0.3s ease-out forwards;
}

.shrink {
  animation: shrinkBar 0.6s ease-out forwards;
}
  </style>
    {% for message in messages %}
    <div class="alertBox" id="alertBox">
      <div class="bar" id="bar"></div>
      <div class="data" id="data"><p>{{message}}</p></div>
  </div>
  <script>   
    setTimeout(() => {
        document.getElementById("data").classList.add("hideText");
        document.getElementById("alertBox").classList.add("shrink");
        setTimeout(() => {
            document.getElementById("alertBox").style.display = "none";
        }, 500);
    }, 3000);
</script>
  {% endfor %}
{% endif %}
</body>
<script>
    const fileUpload = document.getElementById("fileUpload");
    const profileImage = document.getElementById("profileImage");

    fileUpload.addEventListener("change", function () {
      const file = this.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function (e) {
          profileImage.src = e.target.result;
        };
        reader.readAsDataURL(file);
      }
    });
  </script>
</html>

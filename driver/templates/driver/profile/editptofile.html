{% extends 'driver/profile/profileBase.html' %}

{% block title %}Home - RideSwift{% endblock %}

{% block content %}
{% load static %}
<div class="main">
<div class="profile-pic">
    <img id="profileImage" src="{{vehicle.vehicle_image.url}}" alt="Profile" />
    <label for="fileUpload" class="edit-icon">✎</label>
    <input type="file" id="fileUpload" accept="image/*" />
  <h2>{{driver.name}}</h2>
  <p>{{driver.rights}}</p>
</div>

<form class="form" method="post">
    {% csrf_token %}
  <div class="form-full">
    <label>Name</label>
    <input type="text" name="name" value="{{driver.name}}">
  </div>
  <div class="form-full">
    <label>Phone no</label>
    <input type="text" name="phone" value="{{driver.phone_no}}">
  </div>
  <div class="form-full">
    <label>Email Address</label>
    <input type="email" name="email" value="{{driver.email}}">
  </div>
  <div class="form-full">
    <label>Address</label>
    <input type="text" name="address" value="{{driver.address}}">
  </div>
  <div class="button">
    <button type="submit" class="save-btn">Save Changes</button>
  </div>

</form>
</div>
{% endblock %}

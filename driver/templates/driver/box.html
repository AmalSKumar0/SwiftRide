<style>
   
    .custom-card-container {
      background-color: white;
      width: 300px;
      height: 350px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      padding: 16px;
      text-align: left;
    }

    .custom-card-image-wrapper {
      width: 100%;
      height: 150px;
      border-radius: 8px;
      margin-bottom: 16px;
      overflow: hidden;
    }

    .custom-card-image-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 8px;
      display: block;
    }

    .custom-card-title {
        position: relative;
        top: 1px;
        text-align: center;
        width: 100%;
      font-size: 1.25rem;
      font-weight: bold;
      margin: 0;
    }

    .custom-card-subtitle {
      color: #666;
      font-size: 0.9rem;
      margin-top: 4px;
      margin-bottom: 12px;
    }

    .custom-card-description {
      color: #666;
      font-size: 0.85rem;
      margin-bottom: 16px;
    }

    .custom-card-buttons {
      display: flex;
      gap: 10px;
    }

    .custom-card-btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 20px;
      font-weight: bold;
      cursor: pointer;
    }

    .custom-card-btn-secondary {
      background-color: #e0e0e0;
      color: #333;
    }

    .custom-card-btn-primary {
      background-color: #333;
      color: white;
    }
  </style>

  <div class="custom-card-container">
    <div class="custom-card-image-wrapper">
      <img src="{{data.vehicle_image.url}}" alt="Dynamic Image">
    </div>
    <h2 class="custom-card-title">{{data.vehicle_type}}</h2>
    <!-- <div class="custom-card-subtitle">{{data.vehicle_number}}</div> -->
    <div class="custom-card-description">
        Manu date:{{data.manufacture_date}}<br>
        license no:{{data.license_number}} <br>
        Vehicle no:{{data.vehicle_number}} 
        
    </div>
    <div class="custom-card-buttons">
      <button onclick="location.href=`{% url 'driverVehicles' %}`" class="custom-card-btn custom-card-btn-secondary">change</button>
      <button class="custom-card-btn custom-card-btn-primary">Primary</button>
    </div>
  </div>

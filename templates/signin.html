{% extends 'base.html' %}

{% block title %}Home - RideSwift{% endblock %}

{% block content %}
{% load static %}
<br>
<br>
    <header class="header__container">
      <div >
        <div class="form">
            <div class="header">
                <h2>Welcome back</h2>
                <p>Login to become part of our community, Not a passenger?<a class="link" href="{%  url 'login' %}">register</a></p>
            </div>
            <div class="body">
                <div class="steps">
                    <div class="step">
                        <form method="post" enctype="multipart/form-data">
                            {% csrf_token %}
                    <div class="grid">
                        <div class="col">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" placeholder="Enter your email" required>
                        </div>
                        <div class="col">
                            <label for="password">Password</label>
                            <input type="password" id="password" name="password" placeholder="Enter your password" required>
                        </div>
                    </div>  
                  
                    <br><br><br>
                    {% if err %}
                    <script>
                        alert("{{err}}");
                    </script>
                    {% endif %}
                    <div class="confirmation">
                        <div>
                            <button class="btn-com" >Login</button>
                        </div>
                    </div>   </form> 
                    </div>
                </div>
            </div>
        </div>
      </div>
      <div class="header__image">
        <img src="{% static 'assets/header.png' %}" alt="header" />
      </div>
    </header>

{% endblock %}
